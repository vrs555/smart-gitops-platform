# k8s-manifests/app-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: gitops-demo-app-service
  namespace: smart-gitops
  labels:
    app: gitops-demo-app
spec:
  type: NodePort
  selector:
    app: gitops-demo-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080