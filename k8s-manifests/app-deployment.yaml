# k8s-manifests/app-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-demo-app
  namespace: smart-gitops
  labels:
    app: gitops-demo-app
    version: v1.0.0
  annotations:
    gitops/managed: "true"
    gitops/repo: "smart-gitops-platform"
spec:
  replicas: 4
  selector:
    matchLabels:
      app: gitops-demo-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gitops-demo-app
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: app
          image: smart-gitops-app:v1.0.0
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: APP_VERSION
              value: "1.0.0"
            - name: SIMULATE_FAILURE
              value: "false"
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3